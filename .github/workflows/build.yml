name: Build and Release Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: "stable"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "flet>=0.24.0" static-ffmpeg
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Build Flet App
        env:
          PYTHONIOENCODING: utf-8
        shell: pwsh
        run: |
          Write-Output "y" | flet build windows . --project "Whisper Transcriber" --product "Whisper Transcriber" --org com.whisper

      - name: Zip output
        id: zip_step
        shell: pwsh
        run: |
          $zipName = "WhisperTranscriber-${{ github.ref_name }}-Windows.zip"
          Compress-Archive -Path build\windows\* -DestinationPath $zipName -Force
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.ZIP_NAME }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
