name: Build Windows

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip' # Ускоряет повторные билды

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          channel: "stable"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "flet>=0.24.0"
          # Если файла requirements.txt нет, команда ниже выдаст ошибку. 
          # Если он есть, она установит whisper и прочее.
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          pip install static-ffmpeg

      - name: Build Flet App
        env:
          PYTHONIOENCODING: utf-8
        run: |
          flet build windows main.py --project "Whisper Transcriber" --product "Whisper Transcriber" --org com.whisper

      - name: Zip output
        shell: pwsh
        run: |
          # Проверяем, создалась ли папка build\windows перед архивацией
          if (Test-Path build\windows) {
            Compress-Archive -Path build\windows\* -DestinationPath WhisperTranscriber-Windows.zip -Force
          } else {
            Write-Error "Build directory not found!"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperTranscriber-Windows
          path: WhisperTranscriber-Windows.zip
          if-no-files-found: error
