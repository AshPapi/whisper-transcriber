name: Build and Release Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Python backend → backend.exe via PyInstaller ──────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r python_backend/requirements.txt
          pip install pyinstaller

      - name: Build backend (onedir)
        shell: pwsh
        run: |
          cd python_backend
          pyinstaller server.py `
            --name backend `
            --onedir `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import multiprocessing `
            --hidden-import asyncio `
            --hidden-import whisper `
            --collect-all whisper `
            --collect-all tiktoken `
            --hidden-import static_ffmpeg `
            --collect-binaries static_ffmpeg `
            --hidden-import requests `
            --collect-all certifi `
            --noconfirm

      # ── Flutter UI → Windows release build ───────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: "stable"

      - name: Flutter pub get & enable Windows
        shell: pwsh
        run: |
          cd flutter_ui
          flutter create --platforms=windows .
          flutter pub get

      - name: Build Flutter Windows app
        shell: pwsh
        run: |
          cd flutter_ui
          flutter build windows --release

      # ── Package everything ────────────────────────────────────────────────
      - name: Assemble release package
        shell: pwsh
        run: |
          $out = "release_pkg"
          New-Item -ItemType Directory -Path $out -Force | Out-Null

          # Flutter app files
          Copy-Item -Recurse "flutter_ui\build\windows\x64\runner\Release\*" "$out\" -Force

          # Python backend (onedir — copy whole folder, exe lives inside)
          Copy-Item -Recurse "python_backend\dist\backend" "$out\backend" -Force

          # Rename Flutter exe to a friendly name for the user
          Rename-Item -Path "$out\whisper_transcriber.exe" -NewName "WhisperTranscriber.exe" -ErrorAction SilentlyContinue

      - name: Zip release package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if (-not $version) { $version = "dev" }
          $zipName = "WhisperTranscriber-$version-Windows.zip"
          Compress-Archive -Path "release_pkg\*" -DestinationPath $zipName -Force
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.ZIP_NAME }}
          name: Whisper Transcriber ${{ github.ref_name }}
          body: |
            ## Whisper Transcriber ${{ github.ref_name }}

            ### Установка
            1. Скачай и распакуй ZIP
            2. Запусти `WhisperTranscriber.exe`

            ### Что внутри
            - `WhisperTranscriber.exe` — основное приложение
            - `backend.exe` — Python/Whisper backend (запускается автоматически, Python не нужен)

            ### Требования
            - Windows 10/11 x64
            - Интернет для первого скачивания модели Whisper
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
